# kapi project recipe for BowMart.
#
# Content = the localization catalogs neokapi-i18n extracts from the React
# source (i18n/src/**/*.klf). kapi translates them into a nested i18n/<lang>/
# tree; `neokapi-i18n compile` then turns those into the runtime catalogs the
# app loads (public/translations/<lang>.json).
#
# The source of truth is the React source; the catalogs are generated. Run
# `npm run i18n:extract` after changing UI copy, then let the pipeline
# translate.
version: v1
name: bowmart

# Server-connected project: kapi push sends the source catalogs to Bowrain,
# which converges (TM -> AI -> checks) and delivers the reviewed
# translations back as pull requests via the GitHub App. The compound URL is
# <server>/<workspace>/<project-id>, filled in when the project was provisioned.
server:
  url: https://app.bowrain.cloud/github-samples/96DtN65Z
  stream: "$auto"      # auto-detect from git branch / CI

defaults:
  source_language: en
  target_languages: [fr, de, ja, nb]
  brand_voice:
    profile_file: i18n/brand-voice.yaml
  termbase_source: i18n/termbase.klftb
content:
  - path: i18n/src/**/*.klf
    target: i18n/{lang}/{path}.klf
# Two-gate ship model. The `ship` gate hides locales that are not yet
# translated enough to offer: ja is still being converged on the server, so it
# stays out of the picker until its catalog lands. The named `verified` gate
# marks a locale as human-reviewed (no "AI" badge); flagship locales (fr, de)
# are held to it, so they show as verified once reviewed and as AI otherwise —
# the picker demonstrates hidden, verified, and AI states side by side.
ship_gate:
  translated: 100
gates:
  verified:
    reviewed: 25
verified_gates:
  - when:
      locales: [fr, de]
    gate: verified
